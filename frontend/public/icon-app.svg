<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a1f1f"/>
      <stop offset="1" stop-color="#b3471a"/>
    </linearGradient>
    <radialGradient id="flame" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#fff6d6"/>
      <stop offset="0.5" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#ff7a18"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffcf66" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffcf66" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background for maskable safe zone -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- warm glow behind the flame -->
  <circle cx="256" cy="220" r="170" fill="url(#glow)"/>

  <!-- flame -->
  <path d="M256 104 C288 152 296 184 276 216 C267 230 245 230 236 216 C219 189 229 158 256 104 Z" fill="url(#flame)"/>
  <path d="M256 144 C270 168 273 186 264 200 C258 208 247 208 241 200 C232 186 240 172 256 144 Z" fill="#fff4cf" opacity="0.9"/>

  <!-- signature Kannada glyph -->
  <text x="256" y="430" font-family="system-ui, sans-serif" font-size="150" font-weight="700"
        text-anchor="middle" fill="#ffe7a3" opacity="0.95">ಕ</text>
</svg>
