<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a1f1f"/>
      <stop offset="1" stop-color="#b3471a"/>
    </linearGradient>
    <linearGradient id="lamp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe7a3"/>
      <stop offset="1" stop-color="#e0992a"/>
    </linearGradient>
    <radialGradient id="flame" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#fff6d6"/>
      <stop offset="0.5" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#ff7a18"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffcf66" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffcf66" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- warm glow behind the flame -->
