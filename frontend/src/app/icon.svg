  <path d="M32 18 C33.8 21 34.2 23.2 33 25 C32.3 26 30.9 26 30.2 25 C29 23.2 30 21.4 32 18 Z" fill="#fff4cf" opacity="0.9"/>

  <!-- diya lamp bowl -->
  <path d="M14 36 C14 33 18 32 32 32 C46 32 50 33 50 36 C50 41 42 46 32 46 C22 46 14 41 14 36 Z" fill="url(#lamp)"/>
  <path d="M14 36 C14 33 18 32 32 32 C46 32 50 33 50 36 C50 37.5 44 39 32 39 C20 39 14 37.5 14 36 Z" fill="#fff1c4" opacity="0.7"/>
  <ellipse cx="32" cy="47.5" rx="11" ry="2.4" fill="#000" opacity="0.18"/>
</svg>
