# ============================================================
# Akkaverse — Local development orchestration
# Spins up PostgreSQL, the FastAPI backend, and the Next.js
# frontend so the whole stack runs with a single command:
#   docker compose up --build
# ============================================================
services:
  db:
    image: postgres:16-alpine
    container_name: akkaverse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-akkaverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-akkaverse}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - akkaverse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akkaverse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: akkaverse-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: akkaverse-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  akkaverse_pgdata:
